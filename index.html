<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>New Political Compass</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --background: #111111;
      --panel: #171717;
      --panel-strong: #202020;
      --input: #252525;
      --grid-major: #3a3a3a;
      --grid-minor: #242424;
      --axis: #b7b7b7;
      --text: #e7e7e7;
      --muted: #a8a8a8;
      --point: #f4f4f4;
      --point-edge: #111111;
      --selected: #fff176;
      --selected-ring: #ff4081;
      --voronoi-edge: #6d6d6d;
      --voronoi-fill: #4fc3f7;
      --tooltip: #222222;
      --tooltip-edge: #eeeeee;
      --focus: #7dd3fc;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      background: var(--background);
      color: var(--text);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--background);
    }

    .topbar {
      display: grid;
      grid-template-columns: auto minmax(220px, 420px) auto 1fr auto;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      background: var(--panel);
      border-bottom: 1px solid #252525;
    }

    .title {
      margin: 0 8px 0 0;
      font-size: 16px;
      font-weight: 700;
      white-space: nowrap;
    }

    .search-label {
      color: var(--text);
      font-size: 12px;
      white-space: nowrap;
    }

    .search-input {
      width: 100%;
      min-width: 0;
      padding: 6px 9px;
      border: 1px solid #303030;
      border-radius: 4px;
      outline: none;
      background: var(--input);
      color: var(--text);
    }

    .search-input:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 2px rgba(125, 211, 252, 0.18);
    }

    .button-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .button {
      min-height: 30px;
      padding: 5px 10px;
      border: 1px solid #333333;
      border-radius: 4px;
      background: #2b2b2b;
      color: var(--text);
      cursor: pointer;
      white-space: nowrap;
    }

    .button:hover {
      background: #3a3a3a;
    }

    .button:focus-visible {
      outline: 2px solid var(--focus);
      outline-offset: 2px;
    }

    .status {
      min-width: 0;
      overflow: hidden;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .body {
      min-height: 0;
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 0;
    }

    .stage {
      min-width: 0;
      min-height: 0;
      display: grid;
      place-items: center;
      padding: 8px;
      background: var(--background);
    }

    .plot-shell {
      width: min(100%, calc(100vh - 78px));
      max-width: 100%;
      aspect-ratio: 1;
      min-height: 320px;
      border: 0;
    }

    svg {
      width: 100%;
      height: 100%;
      display: block;
      user-select: none;
      touch-action: none;
    }

    .side {
      min-height: 0;
      padding: 8px;
      background: var(--background);
      border-left: 1px solid #252525;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .side-heading {
      margin: 0 0 6px;
      font-size: 12px;
      font-weight: 700;
    }

    .matches {
      min-height: 0;
      flex: 1;
      overflow: auto;
      border: 1px solid #333333;
      background: #181818;
    }

    .match {
      width: 100%;
      display: block;
      padding: 7px 8px;
      border: 0;
      border-bottom: 1px solid #262626;
      border-radius: 0;
      background: transparent;
      color: var(--text);
      text-align: left;
      cursor: pointer;
    }

    .match:hover,
    .match.active {
      background: #444444;
      color: var(--selected);
    }

    .match-name {
      display: block;
      overflow: hidden;
      font-size: 11px;
      line-height: 1.25;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .match-meta {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.2;
    }

    .empty {
      padding: 10px 8px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.4;
    }

    .help {
      margin-top: 12px;
      color: var(--muted);
      font-size: 10px;
      line-height: 1.4;
    }

    .grid-line {
      stroke-linecap: square;
      vector-effect: non-scaling-stroke;
    }

    .major {
      stroke: var(--grid-major);
      stroke-width: 0.75;
      opacity: 0.75;
    }

    .minor {
      stroke: var(--grid-minor);
      stroke-width: 0.45;
      opacity: 0.85;
    }

    .axis {
      stroke: var(--axis);
      stroke-width: 1.2;
      opacity: 0.9;
      vector-effect: non-scaling-stroke;
    }

    .boundary {
      fill: none;
      stroke: #888888;
      stroke-width: 1.2;
      opacity: 0.8;
      vector-effect: non-scaling-stroke;
    }

    .cell {
      fill: var(--voronoi-fill);
      fill-opacity: 0.12;
      stroke: var(--voronoi-edge);
      stroke-width: 0.9;
      vector-effect: non-scaling-stroke;
    }

    .point {
      fill: var(--point);
      stroke: var(--point-edge);
      stroke-width: 0.75;
      vector-effect: non-scaling-stroke;
      cursor: pointer;
    }

    .label {
      fill: var(--text);
      font-size: 8.5px;
      opacity: 0.82;
      paint-order: stroke;
      stroke: rgba(17, 17, 17, 0.8);
      stroke-width: 2px;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .label.selected {
      fill: var(--selected);
      font-size: 9.5px;
      font-weight: 700;
      opacity: 1;
    }

    .selected-ring {
      fill: none;
      stroke: var(--selected-ring);
      stroke-width: 2.4;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }

    .selected-dot {
      fill: var(--selected);
      stroke: #000000;
      stroke-width: 1;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }

    .tooltip-box {
      fill: var(--tooltip);
      stroke: var(--tooltip-edge);
      stroke-width: 1;
      opacity: 0.94;
      vector-effect: non-scaling-stroke;
      pointer-events: none;
    }

    .tooltip-text {
      fill: var(--text);
      font-size: 9px;
      pointer-events: none;
    }

    .tick-label {
      fill: var(--muted);
      font-size: 9px;
      pointer-events: none;
    }

    .axis-label {
      fill: var(--muted);
      font-size: 11px;
      pointer-events: none;
    }

    @media (max-width: 860px), (orientation: portrait) {
      .topbar {
        grid-template-columns: 1fr auto auto;
        gap: 8px;
        padding: 9px 10px;
      }

      .title {
        grid-column: 1 / -1;
        margin: 0;
        font-size: 16px;
      }

      .search-label {
        display: none;
      }

      .status {
        grid-column: 1 / -1;
        white-space: normal;
      }

      .body {
        display: flex;
        flex-direction: column;
      }

      .stage {
        padding: 8px 8px 4px;
      }

      .plot-shell {
        width: min(100%, 96vw);
        min-height: 280px;
      }

      .side {
        min-height: 170px;
        max-height: 36vh;
        border-left: 0;
        border-top: 1px solid #252525;
      }

      .help {
        display: none;
      }
    }

    @media (max-width: 460px) {
      .topbar {
        grid-template-columns: 1fr;
      }

      .button-row {
        justify-content: stretch;
      }

      .button {
        flex: 1;
      }

      .plot-shell {
        min-height: 250px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <h1 class="title">New Political Compass</h1>
      <label class="search-label" for="search">Search point:</label>
      <input id="search" class="search-input" type="search" autocomplete="off" placeholder="Search point">
      <div class="button-row">
        <button id="clear" class="button" type="button">Clear</button>
        <button id="reset" class="button" type="button">Reset view</button>
      </div>
      <div id="status" class="status">Loading data...</div>
    </header>

    <section class="body">
      <div class="stage">
        <div class="plot-shell">
          <svg id="plot" role="img" aria-label="New Political Compass interactive plot"></svg>
        </div>
      </div>

      <aside class="side">
        <h2 class="side-heading">Matches</h2>
        <div id="matches" class="matches">
          <div class="empty">Type to search by point name or group.</div>
        </div>
        <div class="help">Scroll: zoom<br>Drag: pan<br>Click point: info<br>Esc: clear</div>
      </aside>
    </section>
  </main>

  <script>
    const APP_TITLE = "New Political Compass";
    const CSV_PATH = "ideology_coordinates.csv";
    const WORLD_MIN = -10;
    const WORLD_MAX = 10;
    const WORLD_SPAN = WORLD_MAX - WORLD_MIN;
    const MIN_VIEW_SPAN = 0.75;
    const SEARCH_FOCUS_SPAN = 6;
    const MAX_SEARCH_RESULTS = 15;
    const PLOT_SIZE = 1000;
    const POINT_RADIUS = 3.4;

    const state = {
      points: [],
      warnings: [],
      selectedIndex: null,
      matches: [],
      transform: d3.zoomIdentity,
      coordIndex: new Map()
    };

    const elements = {
      search: document.getElementById("search"),
      clear: document.getElementById("clear"),
      reset: document.getElementById("reset"),
      status: document.getElementById("status"),
      matches: document.getElementById("matches"),
      svg: d3.select("#plot")
    };

    const xScale = d3.scaleLinear().domain([WORLD_MIN, WORLD_MAX]).range([0, PLOT_SIZE]);
    const yScale = d3.scaleLinear().domain([WORLD_MIN, WORLD_MAX]).range([PLOT_SIZE, 0]);

    elements.svg.attr("viewBox", `0 0 ${PLOT_SIZE} ${PLOT_SIZE}`);

    const root = elements.svg.append("g");
    const gridLayer = root.append("g").attr("class", "grid-layer");
    const cellLayer = root.append("g").attr("class", "cell-layer");
    const pointLayer = root.append("g").attr("class", "point-layer");
    const labelLayer = elements.svg.append("g").attr("class", "label-layer");
    const selectedLayer = elements.svg.append("g").attr("class", "selected-layer");
    const overlay = elements.svg.append("rect")
      .attr("width", PLOT_SIZE)
      .attr("height", PLOT_SIZE)
      .attr("fill", "transparent")
      .attr("pointer-events", "all");

    const zoom = d3.zoom()
      .scaleExtent([1, WORLD_SPAN / MIN_VIEW_SPAN])
      .translateExtent([[0, 0], [PLOT_SIZE, PLOT_SIZE]])
      .extent([[0, 0], [PLOT_SIZE, PLOT_SIZE]])
      .filter((event) => !event.ctrlKey || event.type === "wheel")
      .on("zoom", (event) => {
        state.transform = event.transform;
        applyTransform();
      });

    elements.svg.call(zoom);
    overlay.lower();

    function csvRows(text) {
      const rows = [];
      let row = [];
      let field = "";
      let quoted = false;

      for (let index = 0; index < text.length; index += 1) {
        const char = text[index];
        const next = text[index + 1];

        if (quoted) {
          if (char === '"' && next === '"') {
            field += '"';
            index += 1;
          } else if (char === '"') {
            quoted = false;
          } else {
            field += char;
          }
          continue;
        }

        if (char === '"') {
          quoted = true;
        } else if (char === ",") {
          row.push(field);
          field = "";
        } else if (char === "\n") {
          row.push(field);
          rows.push(row);
          row = [];
          field = "";
        } else if (char !== "\r") {
          field += char;
        }
      }

      if (field.length || row.length) {
        row.push(field);
        rows.push(row);
      }

      return rows;
    }

    function parsePoints(text) {
      const rows = csvRows(text).filter((row) => row.some((value) => value.trim() !== ""));
      if (!rows.length) {
        throw new Error("The CSV file is empty.");
      }

      const headers = rows[0].map((header) => header.trim().toLowerCase());
      const nameColumn = headers.indexOf("name");
      const xColumn = headers.indexOf("x");
      const yColumn = headers.indexOf("y");
      const groupColumn = headers.indexOf("group");

      if (nameColumn === -1 || xColumn === -1 || yColumn === -1) {
        throw new Error("The CSV is missing required column(s). Expected at least: name,x,y");
      }

      const points = [];
      const warnings = [];
      let fallbackCounter = 1;

      rows.slice(1).forEach((row, rowIndex) => {
        const rowNumber = rowIndex + 2;
        const rawX = row[xColumn];
        const rawY = row[yColumn];
        const x = Number(rawX);
        const y = Number(rawY);

        if (!Number.isFinite(x) || !Number.isFinite(y)) {
          warnings.push(`Skipped row ${rowNumber}: x/y values must be numeric.`);
          return;
        }

        if (x < WORLD_MIN || x > WORLD_MAX || y < WORLD_MIN || y > WORLD_MAX) {
          warnings.push(`Skipped row ${rowNumber}: point (${x}, ${y}) is outside the ${WORLD_MIN} to ${WORLD_MAX} bounds.`);
          return;
        }

        const rawName = (row[nameColumn] || "").trim();
        const rawGroup = groupColumn >= 0 ? (row[groupColumn] || "").trim() : "";
        points.push({
          name: rawName || `Point ${fallbackCounter++}`,
          x,
          y,
          group: rawGroup || null,
          rowNumber
        });
      });

      if (points.length < 3) {
        throw new Error("At least 3 valid in-bounds points are required to build a Voronoi diagram.");
      }

      return { points, warnings };
    }

    function formatNumber(value) {
      return Number.parseFloat(value.toFixed(6)).toString();
    }

    function coordKey(point) {
      return `${point.x.toFixed(12)},${point.y.toFixed(12)}`;
    }

    function buildCoordIndex() {
      state.coordIndex = new Map();
      state.points.forEach((point, index) => {
        const key = coordKey(point);
        if (!state.coordIndex.has(key)) {
          state.coordIndex.set(key, []);
        }
        state.coordIndex.get(key).push(index);
      });
    }

    function updateStatus() {
      const groupCount = state.points.filter((point) => point.group).length;
      const warningText = state.warnings.length ? ` | ${state.warnings.length} skipped row(s)` : "";
      elements.status.textContent = `${state.points.length} point(s) loaded | ${groupCount} with group values${warningText}`;
    }

    function drawGrid() {
      gridLayer.selectAll("*").remove();
      const minorTicks = d3.range(WORLD_MIN, WORLD_MAX + 0.5, 1);
      const majorTicks = d3.range(WORLD_MIN, WORLD_MAX + 1, 2);

      gridLayer.selectAll(".minor-x")
        .data(minorTicks)
        .join("line")
        .attr("class", "grid-line minor")
        .attr("x1", (d) => xScale(d))
        .attr("x2", (d) => xScale(d))
        .attr("y1", 0)
        .attr("y2", PLOT_SIZE);

      gridLayer.selectAll(".minor-y")
        .data(minorTicks)
        .join("line")
        .attr("class", "grid-line minor")
        .attr("x1", 0)
        .attr("x2", PLOT_SIZE)
        .attr("y1", (d) => yScale(d))
        .attr("y2", (d) => yScale(d));

      gridLayer.selectAll(".major-x")
        .data(majorTicks)
        .join("line")
        .attr("class", "grid-line major")
        .attr("x1", (d) => xScale(d))
        .attr("x2", (d) => xScale(d))
        .attr("y1", 0)
        .attr("y2", PLOT_SIZE);

      gridLayer.selectAll(".major-y")
        .data(majorTicks)
        .join("line")
        .attr("class", "grid-line major")
        .attr("x1", 0)
        .attr("x2", PLOT_SIZE)
        .attr("y1", (d) => yScale(d))
        .attr("y2", (d) => yScale(d));

      gridLayer.append("line")
        .attr("class", "axis")
        .attr("x1", 0)
        .attr("x2", PLOT_SIZE)
        .attr("y1", yScale(0))
        .attr("y2", yScale(0));

      gridLayer.append("line")
        .attr("class", "axis")
        .attr("x1", xScale(0))
        .attr("x2", xScale(0))
        .attr("y1", 0)
        .attr("y2", PLOT_SIZE);

      gridLayer.append("rect")
        .attr("class", "boundary")
        .attr("x", 0)
        .attr("y", 0)
        .attr("width", PLOT_SIZE)
        .attr("height", PLOT_SIZE);

      gridLayer.selectAll(".tick-x")
        .data(majorTicks)
        .join("text")
        .attr("class", "tick-label")
        .attr("x", (d) => xScale(d) + 3)
        .attr("y", yScale(0) - 5)
        .text((d) => d);

      gridLayer.selectAll(".tick-y")
        .data(majorTicks.filter((d) => d !== 0))
        .join("text")
        .attr("class", "tick-label")
        .attr("x", xScale(0) + 5)
        .attr("y", (d) => yScale(d) - 3)
        .text((d) => d);

      gridLayer.append("text")
        .attr("class", "axis-label")
        .attr("x", PLOT_SIZE - 16)
        .attr("y", yScale(0) - 8)
        .text("x");

      gridLayer.append("text")
        .attr("class", "axis-label")
        .attr("x", xScale(0) + 8)
        .attr("y", 16)
        .text("y");
    }

    function drawVoronoi() {
      cellLayer.selectAll("*").remove();
      const unique = [];
      const seen = new Set();

      state.points.forEach((point) => {
        const key = coordKey(point);
        if (!seen.has(key)) {
          seen.add(key);
          unique.push(point);
        }
      });

      const delaunay = d3.Delaunay.from(unique, (point) => xScale(point.x), (point) => yScale(point.y));
      const voronoi = delaunay.voronoi([0, 0, PLOT_SIZE, PLOT_SIZE]);

      cellLayer.selectAll("path")
        .data(unique)
        .join("path")
        .attr("class", "cell")
        .attr("d", (_point, index) => voronoi.renderCell(index));
    }

    function drawPoints() {
      pointLayer.selectAll("circle")
        .data(state.points)
        .join("circle")
        .attr("class", "point")
        .attr("r", POINT_RADIUS)
        .attr("cx", (point) => xScale(point.x))
        .attr("cy", (point) => yScale(point.y))
        .on("click", (event, point) => {
          event.stopPropagation();
          const index = state.points.indexOf(point);
          selectPoint(index, false);
        });
    }

    function drawLabels() {
      labelLayer.selectAll("text")
        .data(state.points)
        .join("text")
        .attr("class", (_point, index) => index === state.selectedIndex ? "label selected" : "label")
        .attr("x", (point) => state.transform.applyX(xScale(point.x)) + 4)
        .attr("y", (point) => state.transform.applyY(yScale(point.y)) - 4)
        .text((point) => point.name);
    }

    function pointInfo(index) {
      const point = state.points[index];
      const lines = [point.name, `x: ${formatNumber(point.x)}`, `y: ${formatNumber(point.y)}`];
      if (point.group) {
        lines.push(`group: ${point.group}`);
      }

      const sameSpot = (state.coordIndex.get(coordKey(point)) || [])
        .filter((pointIndex) => pointIndex !== index)
        .map((pointIndex) => state.points[pointIndex].name);

      if (sameSpot.length) {
        let preview = sameSpot.slice(0, 3).join(", ");
        if (sameSpot.length > 3) {
          preview += `, +${sameSpot.length - 3} more`;
        }
        lines.push(`same spot: ${preview}`);
      }

      return lines;
    }

    function drawSelected() {
      selectedLayer.selectAll("*").remove();
      if (state.selectedIndex === null) {
        return;
      }

      const point = state.points[state.selectedIndex];
      const px = state.transform.applyX(xScale(point.x));
      const py = state.transform.applyY(yScale(point.y));
      const selectedGroup = selectedLayer.append("g").attr("class", "selected");

      selectedGroup.append("circle")
        .attr("class", "selected-ring")
        .attr("r", 14)
        .attr("cx", px)
        .attr("cy", py);

      selectedGroup.append("circle")
        .attr("class", "selected-dot")
        .attr("r", 5.8)
        .attr("cx", px)
        .attr("cy", py);

      const tooltip = selectedGroup.append("g")
        .attr("transform", `translate(${Math.min(px + 14, PLOT_SIZE - 260)}, ${Math.max(py - 4, 16)})`);

      const lines = pointInfo(state.selectedIndex);
      const maxChars = Math.max(...lines.map((line) => line.length));
      const boxWidth = Math.min(260, Math.max(110, maxChars * 5.3 + 18));
      const boxHeight = lines.length * 13 + 14;

      tooltip.append("rect")
        .attr("class", "tooltip-box")
        .attr("rx", 4)
        .attr("ry", 4)
        .attr("x", 0)
        .attr("y", 0)
        .attr("width", boxWidth)
        .attr("height", boxHeight);

      tooltip.selectAll("text")
        .data(lines)
        .join("text")
        .attr("class", "tooltip-text")
        .attr("x", 8)
        .attr("y", (_line, lineIndex) => 16 + lineIndex * 13)
        .text((line) => line);
    }

    function drawAll() {
      drawGrid();
      drawVoronoi();
      drawPoints();
      drawLabels();
      drawSelected();
      applyTransform();
    }

    function applyTransform() {
      root.attr("transform", state.transform);
      const inverseScale = 1 / state.transform.k;
      root.selectAll(".point")
        .attr("r", POINT_RADIUS * inverseScale)
        .attr("stroke-width", 0.75 * inverseScale);
      drawLabels();
      drawSelected();
    }

    function renderMatches() {
      elements.matches.innerHTML = "";

      const query = elements.search.value.trim().toLowerCase();
      if (!query) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "Type to search by point name or group.";
        elements.matches.append(empty);
        return;
      }

      if (!state.matches.length) {
        const empty = document.createElement("div");
        empty.className = "empty";
        empty.textContent = "No matches.";
        elements.matches.append(empty);
        return;
      }

      state.matches.forEach((index) => {
        const point = state.points[index];
        const button = document.createElement("button");
        button.type = "button";
        button.className = `match${index === state.selectedIndex ? " active" : ""}`;
        button.innerHTML = `<span class="match-name"></span><span class="match-meta"></span>`;
        button.querySelector(".match-name").textContent = point.name;
        button.querySelector(".match-meta").textContent = `(${formatNumber(point.x)}, ${formatNumber(point.y)})${point.group ? ` - ${point.group}` : ""}`;
        button.addEventListener("click", () => selectPoint(index, true));
        elements.matches.append(button);
      });
    }

    function updateSearch() {
      const query = elements.search.value.trim().toLowerCase();
      if (!query) {
        state.matches = [];
        if (state.selectedIndex !== null) {
          state.selectedIndex = null;
          drawLabels();
          drawSelected();
          renderMatches();
        } else {
          renderMatches();
        }
        return;
      }

      state.matches = state.points
        .map((point, index) => ({ point, index }))
        .filter(({ point }) => point.name.toLowerCase().includes(query) || (point.group && point.group.toLowerCase().includes(query)))
        .slice(0, MAX_SEARCH_RESULTS)
        .map(({ index }) => index);

      renderMatches();
    }

    function clampTranslate(transform) {
      const tx = Math.min(0, Math.max(PLOT_SIZE - PLOT_SIZE * transform.k, transform.x));
      const ty = Math.min(0, Math.max(PLOT_SIZE - PLOT_SIZE * transform.k, transform.y));
      return d3.zoomIdentity.translate(tx, ty).scale(transform.k);
    }

    function focusPoint(point) {
      const targetScale = WORLD_SPAN / SEARCH_FOCUS_SPAN;
      const px = xScale(point.x);
      const py = yScale(point.y);
      const transform = d3.zoomIdentity
        .translate(PLOT_SIZE / 2 - px * targetScale, PLOT_SIZE / 2 - py * targetScale)
        .scale(targetScale);
      elements.svg.transition().duration(220).call(zoom.transform, clampTranslate(transform));
    }

    function selectPoint(index, focus) {
      if (index < 0 || index >= state.points.length) {
        return;
      }

      state.selectedIndex = index;
      drawLabels();
      drawSelected();
      renderMatches();

      if (focus) {
        focusPoint(state.points[index]);
      }
    }

    function clearSelection() {
      elements.search.value = "";
      state.matches = [];
      state.selectedIndex = null;
      drawLabels();
      drawSelected();
      renderMatches();
      elements.search.focus();
    }

    function resetView() {
      elements.svg.transition().duration(220).call(zoom.transform, d3.zoomIdentity);
    }

    elements.search.addEventListener("input", updateSearch);
    elements.search.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        if (state.matches.length) {
          selectPoint(state.matches[0], true);
        }
      } else if (event.key === "Escape") {
        event.preventDefault();
        clearSelection();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") {
        clearSelection();
      }
    });

    elements.clear.addEventListener("click", clearSelection);
    elements.reset.addEventListener("click", resetView);
    elements.svg.on("click", () => {
      if (state.selectedIndex !== null) {
        state.selectedIndex = null;
        drawLabels();
        drawSelected();
        renderMatches();
      }
    });

    fetch(CSV_PATH)
      .then((response) => {
        if (!response.ok) {
          throw new Error(`Could not load ${CSV_PATH}.`);
        }
        return response.text();
      })
      .then((text) => {
        const parsed = parsePoints(text);
        state.points = parsed.points;
        state.warnings = parsed.warnings;
        buildCoordIndex();
        updateStatus();
        drawAll();
      })
      .catch((error) => {
        elements.status.textContent = `${APP_TITLE}: ${error.message} Run a local server or publish with GitHub Pages.`;
        elements.matches.innerHTML = `<div class="empty">${error.message}</div>`;
      });
  </script>
</body>
</html>
